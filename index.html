<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escalas AFA</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, Segoe UI, Arial, sans-serif; background: #f8fafc; color: #1e293b; margin: 0; padding: 20px; }
  .app { max-width: 1100px; margin: 0 auto; background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; overflow: hidden; }
  .header { border-bottom: 1px solid #e2e8f0; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
  .header h1 { font-size: 18px; margin: 0; }
  .header p { font-size: 13px; color: #64748b; margin: 2px 0 0; }
  .btn { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; padding: 6px 12px; border-radius: 6px; border: 1px solid #cbd5e1; background: #fff; color: #334155; cursor: pointer; }
  .btn:hover { background: #f8fafc; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn-primary { background: #1e293b; color: #fff; border-color: #1e293b; }
  .btn-primary:hover { background: #334155; }
  .btn-approve { border-color: #6ee7b7; color: #047857; }
  .btn-approve:hover { background: #ecfdf5; }
  .msg { padding: 8px 20px; background: #eff6ff; color: #1e40af; font-size: 13px; border-bottom: 1px solid #dbeafe; }
  .tabs { display: flex; border-bottom: 1px solid #e2e8f0; padding: 0 20px; overflow-x: auto; }
  .tab { padding: 10px 12px; font-size: 13px; color: #64748b; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; }
  .tab.active { color: #0f172a; font-weight: 600; border-bottom-color: #0f172a; }
  .content { padding: 20px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; color: #64748b; font-weight: 500; padding: 6px 8px; border-bottom: 1px solid #e2e8f0; }
  td { padding: 4px 8px; border-bottom: 1px solid #f1f5f9; }
  input, select { font-size: 13px; padding: 4px 6px; border: 1px solid #e2e8f0; border-radius: 4px; }
  .row-weekend { background: #fffbeb; }
  .row-missing { background: #fef2f2; }
  .hint { font-size: 12px; color: #94a3b8; margin-bottom: 10px; }
  .tag { display: inline-block; font-size: 12px; padding: 2px 8px; border-radius: 10px; background: #f1f5f9; color: #334155; margin: 2px; }
  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
  .del-btn { background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 14px; }
  .del-btn:hover { color: #dc2626; }
  .warn { color: #b91c1c; border-color: #fca5a5 !important; }
  .ok { color: #047857; font-size: 12px; }
  .config-field { max-width: 320px; margin-bottom: 14px; }
  .config-field label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; }
  .empty { text-align: center; color: #94a3b8; padding: 24px; font-size: 13px; }
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
"use strict";

// =====================================================================
// ESTADO
// =====================================================================
function mondayBefore(d) {
  var day = d.getDay();
  return addDays(d, day === 0 ? -6 : 1 - day);
}
var state = {
  militares: [],
  excecoes: [],
  pedidos: [],
  trocas: [],
  historico: [],
  feriadosManuais: [],
  dataInicio: mondayBefore(new Date()),
  numDias: 30,
  resultAODA: [],
  resultODA: [],
  tab: "militares",
  msg: "",
  formsLink: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSPDQvDB58Zn2kjiJ1BH0w_hHw-2B_uEwFPA71NZfeS0JSg43BN4mZxHC39pwKeV96ZsynKA2aYAL1o/pubhtml",
  trocasFormsLink: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRXUzCYjuuoITxx-EBonHiUZV6ocj-3AjTseeBFKW5BPsqbtVtep5stV9O_z6GfPzFFsXk0zel875sP/pubhtml",
  trocasPedidos: []
};

// =====================================================================
// GUARDAR / CARREGAR (localStorage do browser — fica gravado neste
// computador, mesmo depois de fechares o separador ou atualizares a
// página. Não sai daqui, não vai para nenhum servidor.)
// =====================================================================
var STORAGE_KEY = "escalaAppStateV1";
var PERSIST_FIELDS = ["militares", "excecoes", "pedidos", "trocas", "trocasPedidos", "historico", "feriadosManuais", "dataInicio", "numDias", "resultAODA", "resultODA", "tab", "formsLink", "trocasFormsLink"];
var DATE_FIELDS_BY_LIST = {
  militares: [],
  excecoes: ["dataInicio", "dataApresentacao"],
  pedidos: ["dataInicio", "dataApresentacao", "carimbo"],
  trocas: ["data"],
  trocasPedidos: ["data", "carimbo"],
  historico: ["data"],
  feriadosManuais: ["data"],
  resultAODA: ["data"],
  resultODA: ["data"]
};

function saveState() {
  try {
    var toSave = {};
    PERSIST_FIELDS.forEach(function (f) { toSave[f] = state[f]; });
    toSave.dataInicio = state.dataInicio ? state.dataInicio.toISOString() : null;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
  } catch (e) {
    // Guardar pode falhar se o browser bloquear localStorage (ex: modo privado) — a app
    // continua a funcionar na mesma, só não guarda entre sessões.
  }
}

function reviveDatesInList(list, fields) {
  if (!Array.isArray(list)) return [];
  return list.map(function (item) {
    var copy = Object.assign({}, item);
    fields.forEach(function (f) { copy[f] = copy[f] ? new Date(copy[f]) : null; });
    return copy;
  });
}

function loadState() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    var saved = JSON.parse(raw);
    ["militares", "excecoes", "pedidos", "trocas", "trocasPedidos", "historico", "feriadosManuais", "resultAODA", "resultODA"].forEach(function (list) {
      if (saved[list]) state[list] = reviveDatesInList(saved[list], DATE_FIELDS_BY_LIST[list]);
    });
    if (saved.dataInicio) state.dataInicio = new Date(saved.dataInicio);
    if (saved.numDias) state.numDias = saved.numDias;
    if (saved.tab) state.tab = saved.tab;
    if (saved.formsLink) state.formsLink = saved.formsLink;
    if (saved.trocasFormsLink) state.trocasFormsLink = saved.trocasFormsLink;
  } catch (e) {
    // Ficheiro guardado corrompido ou ilegível — ignora e começa do zero.
  }
}
loadState();
garantirHistoricoAtual();

// =====================================================================
// DATAS
// =====================================================================
function toDateOnly(v) {
  if (!v) return null;
  var d = v instanceof Date ? new Date(v.getTime()) : new Date(v);
  if (isNaN(d.getTime())) return null;
  d.setHours(0, 0, 0, 0);
  return d;
}
function addDays(date, days) {
  var d = new Date(date.getTime());
  d.setDate(d.getDate() + days);
  return d;
}
function isWeekendDay(date) { var day = date.getDay(); return day === 0 || day === 6; }

// =====================================================================
// FERIADOS — nacionais (incluindo os móveis, calculados por ano a
// partir da Páscoa) + o municipal de Sintra (São Pedro, 29 de junho),
// mais os que o utilizador definir à mão. Contam como Fim de Semana
// para efeitos de escala.
// =====================================================================
function calcularPascoa(ano) {
  var a = ano % 19, b = Math.floor(ano / 100), c = ano % 100;
  var d = Math.floor(b / 4), e = b % 4, f = Math.floor((b + 8) / 25);
  var g = Math.floor((b - f + 1) / 3), h = (19 * a + b - d - g + 15) % 30;
  var i = Math.floor(c / 4), k = c % 4, l = (32 + 2 * e + 2 * i - h - k) % 7;
  var m = Math.floor((a + 11 * h + 22 * l) / 451);
  var mes = Math.floor((h + l - 7 * m + 114) / 31);
  var dia = ((h + l - 7 * m + 114) % 31) + 1;
  return toDateOnly(new Date(ano, mes - 1, dia));
}
var _feriadosCache = {};
function feriadosNacionaisDoAno(ano) {
  if (_feriadosCache[ano]) return _feriadosCache[ano];
  var pascoa = calcularPascoa(ano);
  var lista = [
    { data: new Date(ano, 0, 1), nome: "Ano Novo" },
    { data: addDays(pascoa, -2), nome: "Sexta-feira Santa" },
    { data: new Date(pascoa.getTime()), nome: "Páscoa" },
    { data: new Date(ano, 3, 25), nome: "Dia da Liberdade" },
    { data: new Date(ano, 4, 1), nome: "Dia do Trabalhador" },
    { data: addDays(pascoa, 60), nome: "Corpo de Deus" },
    { data: new Date(ano, 5, 10), nome: "Dia de Portugal" },
    { data: new Date(ano, 5, 29), nome: "São Pedro (Sintra)" },
    { data: new Date(ano, 7, 15), nome: "Assunção de Nossa Senhora" },
    { data: new Date(ano, 9, 5), nome: "Implantação da República" },
    { data: new Date(ano, 10, 1), nome: "Todos os Santos" },
    { data: new Date(ano, 11, 1), nome: "Restauração da Independência" },
    { data: new Date(ano, 11, 8), nome: "Imaculada Conceição" },
    { data: new Date(ano, 11, 25), nome: "Natal" }
  ];
  lista.forEach(function (f) { f.data = toDateOnly(f.data); });
  _feriadosCache[ano] = lista;
  return lista;
}
function nomeFeriado(date) {
  var d = toDateOnly(date);
  if (!d) return null;
  var manual = state.feriadosManuais.filter(function (f) { var fd = toDateOnly(f.data); return fd && fd.getTime() === d.getTime(); })[0];
  if (manual) return manual.nome || "Feriado";
  var nac = feriadosNacionaisDoAno(d.getFullYear()).filter(function (f) { return f.data.getTime() === d.getTime(); })[0];
  return nac ? nac.nome : null;
}
function isFeriado(date) { return !!nomeFeriado(date); }
function isTipoFimDeSemana(date) { return isWeekendDay(date) || isFeriado(date); }

function nextBusinessDay(date) { var d = addDays(date, 1); while (isWeekendDay(d) || isFeriado(d)) d = addDays(d, 1); return d; }
function weekdayName(date) {
  var names = ["Domingo", "Segunda-feira", "Terça-feira", "Quarta-feira", "Quinta-feira", "Sexta-feira", "Sábado"];
  return names[date.getDay()];
}
function formatDate(d) {
  if (!d) return "";
  var dd = String(d.getDate()).padStart(2, "0"), mm = String(d.getMonth() + 1).padStart(2, "0");
  return dd + "/" + mm + "/" + d.getFullYear();
}
function dateToInputValue(d) {
  if (!d) return "";
  var yyyy = d.getFullYear(), mm = String(d.getMonth() + 1).padStart(2, "0"), dd = String(d.getDate()).padStart(2, "0");
  return yyyy + "-" + mm + "-" + dd;
}
function excelSerialToDate(v) {
  if (v == null || v === "") return null;
  if (v instanceof Date) return v;
  if (typeof v === "number") return new Date(Math.round((v - 25569) * 86400 * 1000));
  var s = String(v).trim();
  var m = s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if (m) { var d = new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3])); return isNaN(d.getTime()) ? null : d; }
  var d2 = new Date(s);
  return isNaN(d2.getTime()) ? null : d2;
}

// =====================================================================
// MOTOR DE ESCALA (idêntico ao já testado)
// =====================================================================
function buildEffectiveExcecoes(excecoes) {
  return excecoes.filter(function (e) { return e.nome && e.dataInicio && e.dataApresentacao; }).map(function (e) {
    var fim = addDays(nextBusinessDay(toDateOnly(e.dataApresentacao)), -1);
    return { nome: e.nome, dataInicio: toDateOnly(e.dataInicio), dataFim: fim };
  });
}
function pruneExpiredExcecoes(excecoes) {
  var hoje = toDateOnly(new Date());
  return excecoes.filter(function (e) {
    if (!e.dataApresentacao) return true;
    var fim = addDays(nextBusinessDay(toDateOnly(e.dataApresentacao)), -1);
    return fim >= hoje;
  });
}
function isExcecaoAtiva(nome, date, eff) {
  return eff.some(function (e) { return e.nome === nome && date >= e.dataInicio && date <= e.dataFim; });
}
// =====================================================================
// HISTÓRICO — quem executou de facto cada dia, desde 1 de janeiro até
// hoje. É a fonte de verdade para "Última Serviço Semana/FDS" de cada
// militar (deixou de se editar isso à mão nos Militares).
// =====================================================================
function seedHistoricoDoImport(nome, escala, data) {
  var d = toDateOnly(data);
  if (!d) return;
  var hoje = toDateOnly(new Date());
  if (d > hoje) return;
  var k = dateToInputValue(d);
  var entrada = state.historico.filter(function (h) { return dateToInputValue(toDateOnly(h.data)) === k; })[0];
  if (!entrada) { entrada = { data: new Date(d.getTime()), execAODA: "", execODA: "" }; state.historico.push(entrada); }
  if (escala === "ODA") entrada.execODA = nome; else entrada.execAODA = nome;
}

function garantirHistoricoAtual() {
  var hoje = toDateOnly(new Date());
  var limite = addDays(hoje, -364); // janela contínua de 365 dias, sem cortes bruscos

  // Poda gradual: tira só o que já saiu da janela dos últimos 365 dias, um dia de cada vez —
  // nunca desaparece tudo de repente (isso deixaria toda a gente "empatada" de início de ano).
  state.historico = state.historico.filter(function (h) {
    var d = toDateOnly(h.data);
    return d && d >= limite;
  });

  var existentes = {};
  state.historico.forEach(function (h) { existentes[dateToInputValue(toDateOnly(h.data))] = true; });
  var ultimo = state.historico.length ? toDateOnly(state.historico[state.historico.length - 1].data) : null;
  var comeco = ultimo ? addDays(ultimo, 1) : limite;
  if (comeco < limite) comeco = limite;
  var d = comeco;
  var novos = [];
  while (d <= hoje) {
    var k = dateToInputValue(d);
    if (!existentes[k]) novos.push({ data: new Date(d.getTime()), execAODA: "", execODA: "" });
    d = addDays(d, 1);
  }
  if (novos.length) state.historico = state.historico.concat(novos);
  state.historico.sort(function (a, b) { return toDateOnly(a.data) - toDateOnly(b.data); });
}

function getUltimoServico(nome, tipo) {
  var melhor = null;
  state.historico.forEach(function (h) {
    var d = toDateOnly(h.data);
    if (!d) return;
    var eWeekend = isTipoFimDeSemana(d);
    if (tipo === "semana" && eWeekend) return;
    if (tipo === "fds" && !eWeekend) return;
    if (h.execAODA !== nome && h.execODA !== nome) return;
    if (!melhor || d > melhor) melhor = d;
  });
  return melhor;
}

function generateSchedule(militares, effExcecoes, trocasInput, escalaAlvo, dataInicio, numDias) {
  var ativos = militares.filter(function (m) { return m.escala === escalaAlvo && m.ativo; });
  var results = [];
  if (ativos.length === 0) {
    for (var i = 0; i < numDias; i++) {
      var dt = addDays(dataInicio, i), we = isTipoFimDeSemana(dt);
      results.push({ data: dt, diaSemana: weekdayName(dt), tipo: we ? "Fim de Semana" : "Semana", efetivo: "SEM DISPONÍVEL", reserva: "SEM DISPONÍVEL" });
    }
    return results;
  }
  var st = ativos.map(function (m) {
    return { nome: m.nome, semana: getUltimoServico(m.nome, "semana") || new Date(2000, 0, 1), fds: getUltimoServico(m.nome, "fds") || new Date(2000, 0, 1) };
  });
  var trocas = trocasInput.filter(function (t) { return t.data && t.nomeado && t.executa; })
    .map(function (t) { return { data: toDateOnly(t.data), nomeado: t.nomeado, executa: t.executa, stage: "pt" }; });

  for (var d = 0; d < numDias; d++) {
    var date = addDays(dataInicio, d);
    var weekend = isTipoFimDeSemana(date);
    var tipo = weekend ? "Fim de Semana" : "Semana";
    var field = weekend ? "fds" : "semana";

    function pickNatural(exclude) {
      var disp = st.filter(function (m) { return exclude.indexOf(m.nome) === -1 && !isExcecaoAtiva(m.nome, date, effExcecoes); })
        .sort(function (a, b) { var diff = a[field].getTime() - b[field].getTime(); return diff !== 0 ? diff : a.nome.localeCompare(b.nome); });
      return disp[0] ? disp[0].nome : "SEM DISPONÍVEL";
    }

    // Se o Histórico já tem registado quem executou de facto este dia, a previsão respeita
    // isso em vez de recalcular (o Histórico é a verdade, a previsão é só quando não se sabe).
    var histField = escalaAlvo === "ODA" ? "execODA" : "execAODA";
    var histEntry = state.historico.filter(function (h) { var hd = toDateOnly(h.data); return hd && hd.getTime() === date.getTime(); })[0];
    var histOverride = histEntry && histEntry[histField] ? histEntry[histField] : null;

    var efetivo = histOverride || pickNatural([]);
    var reserva = pickNatural([efetivo]);

    function creditar(nome) {
      var m = st.filter(function (mm) { return mm.nome === nome; })[0];
      if (m) m[field] = date;
    }

    function applyTrocaEfetivo(naturalNome, outroSlot) {
      if (naturalNome === "SEM DISPONÍVEL") return naturalNome;
      // Credita SEMPRE quem foi naturalmente escolhido — a troca é só uma etiqueta por cima,
      // nunca muda quem "conta" para a rotação. As trocas só se aplicam ao Efetivo.
      creditar(naturalNome);

      var trocaPT = trocas.filter(function (t) { return t.stage === "pt" && t.nomeado === naturalNome && date >= t.data; })[0];
      if (trocaPT) {
        var okY = trocaPT.executa !== outroSlot && trocaPT.executa !== naturalNome && !isExcecaoAtiva(trocaPT.executa, date, effExcecoes);
        if (okY) { trocaPT.stage = "pd"; return naturalNome + " PT / " + trocaPT.executa; }
        return naturalNome;
      }
      var trocaPD = trocas.filter(function (t) { return t.stage === "pd" && t.executa === naturalNome && date >= t.data; })[0];
      if (trocaPD) {
        var okX = trocaPD.nomeado !== outroSlot && trocaPD.nomeado !== naturalNome && !isExcecaoAtiva(trocaPD.nomeado, date, effExcecoes);
        if (okX) { trocaPD.stage = "done"; return naturalNome + " PD / " + trocaPD.nomeado; }
        return naturalNome;
      }
      return naturalNome;
    }
    var efetivoDisplay = applyTrocaEfetivo(efetivo, reserva);
    if (reserva !== "SEM DISPONÍVEL") creditar(reserva);
    var reservaDisplay = reserva;
    results.push({ data: date, diaSemana: weekdayName(date), tipo: tipo, efetivo: efetivoDisplay, reserva: reservaDisplay });
  }
  return results;
}

// =====================================================================
// AÇÕES
// =====================================================================
function setState(patch) { Object.assign(state, patch); render(); }

function handleGerar() {
  var pruned = pruneExpiredExcecoes(state.excecoes);
  state.excecoes = pruned;
  var eff = buildEffectiveExcecoes(pruned);
  state.resultAODA = generateSchedule(state.militares, eff, state.trocas, "AODA", toDateOnly(state.dataInicio), Number(state.numDias));
  state.resultODA = generateSchedule(state.militares, eff, state.trocas, "ODA", toDateOnly(state.dataInicio), Number(state.numDias));
  state.tab = "aoda";
  render();
}

function handleAprovarPedido(idx) {
  var p = state.pedidos[idx];
  var nipLimpo = (p.nip || "").trim().toLowerCase();
  var porNip = nipLimpo ? state.militares.filter(function (m) { return (m.nip || "").trim().toLowerCase() === nipLimpo; })[0] : null;
  var porNome = state.militares.filter(function (m) { return m.nome.trim().toLowerCase() === p.nome.trim().toLowerCase(); })[0];
  var match = porNip || porNome;
  var nomeFinal = match ? match.nome : p.nome;
  state.excecoes = pruneExpiredExcecoes(state.excecoes.concat([{ nome: nomeFinal, dataInicio: p.dataInicio, dataApresentacao: p.dataApresentacao }]));
  state.pedidos = state.pedidos.filter(function (_, i) { return i !== idx; });
  if (!match) state.msg = 'Atenção: "' + p.nome + '" (NIP ' + (p.nip || "—") + ") não corresponde a nenhum militar — confirma na folha Exceções.";
  else if (porNip && porNip !== porNome) state.msg = 'Atenção: o NIP ' + p.nip + ' pertence a "' + porNip.nome + '", usei esse nome em vez de "' + p.nome + '".';
  else state.msg = "";
  render();
}

function updateItem(list, idx, field, value) { state[list][idx][field] = value; render(); }
function removeItem(list, idx) { state[list].splice(idx, 1); render(); }
function addItem(list, empty) { state[list].push(empty()); render(); }

function emptyMilitar() { return { nome: "", nip: "", escala: "AODA", ativo: true, telemovel: "", email: "" }; }
function emptyExcecao() { return { nome: "", dataInicio: null, dataApresentacao: null }; }
function emptyPedido() { return { nome: "", nip: "", dataInicio: null, dataApresentacao: null, motivo: "", carimbo: null }; }
function isPedidoValido(p) {
  if (!p.nome) return false;
  var di = toDateOnly(p.dataInicio), da = toDateOnly(p.dataApresentacao);
  if (!di || !da) return false;
  if (di.getFullYear() < 2020 || di.getFullYear() > 2100) return false;
  if (da.getFullYear() < 2020 || da.getFullYear() > 2100) return false;
  if (da < di) return false;
  return true;
}
function emptyTroca() { return { data: null, nomeado: "", executa: "" }; }
function emptyFeriado() { return { data: null, nome: "" }; }

// ---- Importação / Exportação Excel ----
function normalizeHeader(h) {
  return String(h || "").trim().toLowerCase()
    .replace(/á|à|â|ã/g, "a").replace(/é|ê/g, "e").replace(/í/g, "i").replace(/ó|ô|õ/g, "o").replace(/ú/g, "u").replace(/ç/g, "c");
}
function findCol(headers, candidates) {
  for (var i = 0; i < headers.length; i++) {
    var h = normalizeHeader(headers[i]);
    for (var j = 0; j < candidates.length; j++) {
      if (h.indexOf(candidates[j]) !== -1) return i;
    }
  }
  return -1;
}

function handleConsultarForms() {
  var link = (state.formsLink || "").trim();
  if (!link) { state.msg = "Cola primeiro o link publicado ('Publicar na Web') da folha de respostas do Forms."; render(); return; }
  var m = link.match(/\/spreadsheets\/d\/e\/([^/]+)\//) || link.match(/\/spreadsheets\/d\/e\/([^/]+)$/);
  if (!m) { state.msg = "Não reconheço esse link. Tem de ser o link de 'Publicar na Web' (começa por .../spreadsheets/d/e/... e acaba em pubhtml)."; render(); return; }
  var csvUrl = "https://docs.google.com/spreadsheets/d/e/" + m[1] + "/pub?output=csv";
  var proxyUrl = "https://api.allorigins.win/raw?url=" + encodeURIComponent(csvUrl);
  state.msg = "A consultar o Forms...";
  render();

  fetch(csvUrl)
    .then(function (resp) { if (!resp.ok) throw new Error("HTTP " + resp.status); return resp.text(); })
    .then(processCsvFromForms)
    .catch(function (errDireto) {
      // O Google às vezes não permite este pedido diretamente do browser (CORS). Tenta por
      // um intermediário público antes de desistir.
      fetch(proxyUrl)
        .then(function (resp) { if (!resp.ok) throw new Error("HTTP " + resp.status); return resp.text(); })
        .then(processCsvFromForms)
        .catch(function (errProxy) {
          state.msg = "Não consegui ir buscar os dados diretamente (" + errDireto.message + "), nem pelo caminho alternativo (" +
            errProxy.message + "). Se abriste este ficheiro a clicar duas vezes (file://), hospeda a aplicação num site " +
            "(ex: Netlify Drop) e tenta lá — costuma resolver. Caso contrário, usa a importação por Excel enquanto isto não fica resolvido.";
          render();
        });
    });
}

function processCsvFromForms(csvText) {
  var parsed = Papa.parse(csvText, { header: false, skipEmptyLines: true });
  var rows = parsed.data;
  if (rows.length < 2) { state.msg = "A folha respondeu, mas não tem submissões ainda."; render(); return; }
  var headers = rows[0];
  var iCarimbo = findCol(headers, ["carimbo", "timestamp"]);
  var iNome = findCol(headers, ["nome"]);
  var iNip = findCol(headers, ["nip"]);
  var iInicio = findCol(headers, ["inicio"]);
  var iApresent = findCol(headers, ["apresent"]);
  var iMotivo = findCol(headers, ["motivo"]);
  if (iNome === -1) { state.msg = "Não encontrei uma coluna 'Nome' nas respostas do Forms — confirma as perguntas do formulário."; render(); return; }

  var chave = function (nome, data) { return nome.trim().toLowerCase() + "|" + (data ? dateToInputValue(toDateOnly(data)) : ""); };
  var existentes = {};
  state.excecoes.forEach(function (e) { existentes[chave(e.nome, e.dataInicio)] = true; });
  state.pedidos.forEach(function (p) { existentes[chave(p.nome, p.dataInicio)] = true; });

  var novos = 0, invalidos = 0;
  for (var r = 1; r < rows.length; r++) {
    var row = rows[r];
    var nome = iNome !== -1 ? String(row[iNome] || "").trim() : "";
    if (!nome) continue;
    var dataInicio = iInicio !== -1 ? excelSerialToDate(row[iInicio]) : null;
    var pedido = {
      nome: nome,
      nip: iNip !== -1 ? String(row[iNip] || "").trim() : "",
      dataInicio: dataInicio,
      dataApresentacao: iApresent !== -1 ? excelSerialToDate(row[iApresent]) : null,
      motivo: iMotivo !== -1 ? String(row[iMotivo] || "").trim() : "",
      carimbo: iCarimbo !== -1 ? excelSerialToDate(row[iCarimbo]) : null
    };
    var k = chave(nome, dataInicio);
    if (existentes[k]) continue;
    existentes[k] = true;
    if (!isPedidoValido(pedido)) { invalidos++; continue; }
    state.pedidos.push(pedido);
    novos++;
  }
  state.msg = "Trazidas " + novos + " submissões novas." + (invalidos > 0 ? " Ignoradas " + invalidos + " com datas inválidas ou sem sentido." : "") +
    (novos === 0 && invalidos === 0 ? " (Sem submissões novas — já estavam todas em Pedidos ou Exceções.)" : "");
  render();
}

function processCsvFromTrocasForms(csvText) {
  var parsed = Papa.parse(csvText, { header: false, skipEmptyLines: true });
  var rows = parsed.data;
  if (rows.length < 2) { state.msg = "A folha respondeu, mas não tem submissões de trocas ainda."; render(); return; }
  var headers = rows[0];
  var iCarimbo = findCol(headers, ["carimbo", "timestamp"]);
  var iData = findCol(headers, ["data"]);
  var iNomeado = findCol(headers, ["nomeado"]);
  var iExecuta = findCol(headers, ["executa"]);
  if (iData === -1 || iNomeado === -1 || iExecuta === -1) {
    state.msg = "Não encontrei as colunas 'Data', 'Nomeado' e 'Executa' nas respostas do Forms — confirma as perguntas do formulário.";
    render(); return;
  }

  var chave = function (t) { return dateToInputValue(toDateOnly(t.data)) + "|" + (t.nomeado || "").trim().toLowerCase() + "|" + (t.executa || "").trim().toLowerCase(); };
  var existentes = {};
  state.trocas.forEach(function (t) { existentes[chave(t)] = true; });
  state.trocasPedidos.forEach(function (t) { existentes[chave(t)] = true; });

  var novos = 0, invalidos = 0, passadas = 0;
  var hoje = toDateOnly(new Date());
  for (var r = 1; r < rows.length; r++) {
    var row = rows[r];
    var data = excelSerialToDate(row[iData]);
    var nomeado = String(row[iNomeado] || "").trim();
    var executa = String(row[iExecuta] || "").trim();
    if (!nomeado || !executa) continue;
    var d = toDateOnly(data);
    if (!d || d.getFullYear() < 2020 || d.getFullYear() > 2100) { invalidos++; continue; }
    if (d < hoje) { passadas++; continue; }
    var entrada = { data: data, nomeado: nomeado, executa: executa, carimbo: iCarimbo !== -1 ? excelSerialToDate(row[iCarimbo]) : null };
    var k = chave(entrada);
    if (existentes[k]) continue;
    existentes[k] = true;
    state.trocasPedidos.push(entrada);
    novos++;
  }
  state.msg = "Trazidas " + novos + " trocas novas." +
    (invalidos > 0 ? " Ignoradas " + invalidos + " com datas inválidas." : "") +
    (passadas > 0 ? " Ignoradas " + passadas + " com data já passada." : "") +
    (novos === 0 && invalidos === 0 && passadas === 0 ? " (Sem submissões novas.)" : "");
  render();
}

function handleAprovarTrocaForms(idx) {
  var t = state.trocasPedidos[idx];
  state.trocas.push({ data: t.data, nomeado: t.nomeado, executa: t.executa });
  state.trocasPedidos = state.trocasPedidos.filter(function (_, i) { return i !== idx; });
  state.msg = "Troca aprovada — passou para o separador Trocas.";
  render();
}

function handleImportFile(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function (ev) {
    try {
      var data = new Uint8Array(ev.target.result);
      var wb = XLSX.read(data, { type: "array", cellDates: true });
      var milCount = 0, excCount = 0, pedCount = 0;

      var milSheetName = wb.SheetNames.filter(function (n) { return n.toLowerCase().indexOf("militar") !== -1; })[0];
      if (milSheetName) {
        var rowsM = XLSX.utils.sheet_to_json(wb.Sheets[milSheetName], { header: 1, range: 2, defval: null });
        var parsedM = rowsM.filter(function (r) { return r[4]; }).map(function (r) {
          var nome = String(r[4]).trim();
          var existente = state.militares.filter(function (m) { return m.nome.trim().toLowerCase() === nome.toLowerCase(); })[0];
          var nip = r[3] != null ? String(r[3]).trim() : "";
          var escalaM = r[5] ? String(r[5]).trim() : "AODA";
          seedHistoricoDoImport(nome, escalaM, excelSerialToDate(r[7]));
          seedHistoricoDoImport(nome, escalaM, excelSerialToDate(r[8]));
          return {
            nome: nome, nip: nip || (existente ? existente.nip : "") || "",
            escala: escalaM,
            ativo: String(r[6]).trim().toLowerCase() === "sim",
            telemovel: existente ? existente.telemovel : "", email: existente ? existente.email : ""
          };
        });
        state.militares = parsedM; milCount = parsedM.length;
      }

      var excSheetName = wb.SheetNames.filter(function (n) { return n.toLowerCase().indexOf("exce") !== -1; })[0];
      var parsedExc = state.excecoes;
      if (excSheetName) {
        var rowsE = XLSX.utils.sheet_to_json(wb.Sheets[excSheetName], { header: 1, range: 2, defval: null });
        parsedExc = rowsE.filter(function (r) { return r[0]; }).map(function (r) {
          return { nome: String(r[0]).trim(), dataInicio: excelSerialToDate(r[1]), dataApresentacao: excelSerialToDate(r[2]) };
        });
        state.excecoes = parsedExc; excCount = parsedExc.length;
      }

      var formsSheetName = wb.SheetNames.filter(function (n) { return n.toLowerCase().indexOf("form") !== -1; })[0];
      var invalidCount = 0;
      if (formsSheetName) {
        var rowsF = XLSX.utils.sheet_to_json(wb.Sheets[formsSheetName], { header: 1, range: 2, defval: null });
        var chave = function (nome, data) { return nome.trim().toLowerCase() + "|" + (data ? dateToInputValue(toDateOnly(data)) : ""); };
        var existentes = {}; parsedExc.forEach(function (e) { existentes[chave(e.nome, e.dataInicio)] = true; });
        var parsedP = rowsF.filter(function (r) { return r[1]; }).map(function (r) {
          return {
            carimbo: excelSerialToDate(r[0]), nome: String(r[1]).trim(), nip: r[2] != null ? String(r[2]).trim() : "",
            dataInicio: excelSerialToDate(r[3]), dataApresentacao: excelSerialToDate(r[4]), motivo: r[5] != null ? String(r[5]).trim() : ""
          };
        }).filter(function (p) { return !existentes[chave(p.nome, p.dataInicio)]; });
        var validP = parsedP.filter(function (p) { return isPedidoValido(p); });
        invalidCount = parsedP.length - validP.length;
        state.pedidos = validP; pedCount = validP.length;
      }

      state.msg = "Importado: " + milCount + " militares, " + excCount + " exceções, " + pedCount + " pedidos do Forms (por aprovar)." +
        (invalidCount > 0 ? " Ignorados " + invalidCount + " com datas inválidas." : "");
    } catch (err) {
      state.msg = "Não consegui ler este ficheiro. Confirma que é o .xlsx exportado do Excel.";
    }
    render();
  };
  reader.readAsArrayBuffer(file);
  input.value = "";
}

function handleAddMilitaresFile(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function (ev) {
    try {
      var data = new Uint8Array(ev.target.result);
      var wb = XLSX.read(data, { type: "array", cellDates: true });
      var rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1, range: 1, defval: null });
      var existentes = {}; state.militares.forEach(function (m) { existentes[m.nome.trim().toLowerCase()] = true; });
      var novos = [], ignorados = [];
      rows.filter(function (r) { return r[0]; }).forEach(function (r) {
        var nome = String(r[0]).trim();
        if (existentes[nome.toLowerCase()]) { ignorados.push(nome); return; }
        existentes[nome.toLowerCase()] = true;
        var escalaM = r[1] ? String(r[1]).trim() : "AODA";
        seedHistoricoDoImport(nome, escalaM, excelSerialToDate(r[3]));
        seedHistoricoDoImport(nome, escalaM, excelSerialToDate(r[4]));
        novos.push({
          nome: nome, nip: r[5] != null ? String(r[5]).trim() : "",
          escala: escalaM,
          ativo: r[2] == null ? true : String(r[2]).trim().toLowerCase() === "sim",
          telemovel: "", email: ""
        });
      });
      state.militares = state.militares.concat(novos);
      state.msg = "Adicionados " + novos.length + " militares novos." + (ignorados.length ? " Ignorados (já existiam): " + ignorados.join(", ") + "." : "");
    } catch (err) { state.msg = "Não consegui ler este ficheiro. Confirma o formato das colunas."; }
    render();
  };
  reader.readAsArrayBuffer(file);
  input.value = "";
}

function handleExportExcel() {

    results.forEach(function (r) { data.push([formatDate(r.data), r.diaSemana, r.tipo, r.efetivo, r.reserva]); });

}

    return h;
  }
  var html = '<p class="hint">Regista aqui quem executou de facto cada dia, numa janela contínua dos últimos 365 dias até hoje (cresce sozinho, dia a dia; os dias mais antigos vão saindo aos poucos, sem cortes bruscos). É daqui que vem a "Última Serviço" de cada militar — deixou de se editar à mão nos Militares.</p>';
  html += '<table><thead><tr><th>Data</th><th>Dia</th><th>Tipo</th><th>Executou (AODA)</th><th>Executou (ODA)</th></tr></thead><tbody>';
  var idxs = state.historico.map(function (h, i) { return i; }).sort(function (a, b) { return toDateOnly(state.historico[b].data) - toDateOnly(state.historico[a].data); });
  idxs.forEach(function (idx) {
    var h = state.historico[idx];
    var d = toDateOnly(h.data);
    var weekend = isTipoFimDeSemana(d);
    html += '<tr class="' + (weekend ? "row-weekend" : "") + '">';
    html += "<td>" + formatDate(d) + "</td><td>" + weekdayName(d) + "</td><td>" + (weekend ? "Fim de Semana" : "Semana") + "</td>";
    html += '<td><select onchange="updateItem(\'historico\',' + idx + ",'execAODA',this.value)\">" + opcoes(militaresAODA, h.execAODA) + "</select></td>";
    html += '<td><select onchange="updateItem(\'historico\',' + idx + ",'execODA',this.value)\">" + opcoes(militaresODA, h.execODA) + "</select></td>";
    html += "</tr>";
  });
  html += "</tbody></table>";
  return html;
}

function renderExcecoes() {
  var html = '<div class="toolbar"><p class="hint" style="margin:0">' + state.excecoes.length + ' exceções</p><button class="btn" onclick="addItem(\'excecoes\', emptyExcecao)">+ Adicionar</button></div>';
  html += '<p class="hint">O regresso é sempre calculado automaticamente: o militar só volta a entrar em escala no dia útil a seguir à Data de Apresentação. As que já expiraram são apagadas sozinhas sempre que geras a escala.</p>';
  html += '<table><thead><tr><th>Nome</th><th>Data Início</th><th>Data Apresentação</th><th>Volta à escala em</th><th></th></tr></thead><tbody>';
  if (state.excecoes.length === 0) html += '<tr><td colspan="5" class="empty">Sem exceções.</td></tr>';
  state.excecoes.forEach(function (e, idx) {
    var fimCalc = e.dataApresentacao ? addDays(nextBusinessDay(toDateOnly(e.dataApresentacao)), -1) : null;
    var volta = fimCalc ? addDays(fimCalc, 1) : null;
    var naoEncontrado = e.nome && !state.militares.some(function (m) { return m.nome === e.nome; });
    html += "<tr>";
    html += '<td><select class="' + (naoEncontrado ? "warn" : "") + '" onchange="updateItem(\'excecoes\',' + idx + ",'nome',this.value)\">";
    html += militarOptions(e.nome);
    if (naoEncontrado) html += '<option value="' + esc(e.nome) + '" selected>' + esc(e.nome) + " (não encontrado!)</option>";
    html += "</select></td>";
    html += '<td><input type="date" value="' + dateToInputValue(e.dataInicio) + '" onchange="updateItem(\'excecoes\',' + idx + ",'dataInicio',this.value?new Date(this.value):null)\"></td>";
    html += '<td><input type="date" value="' + dateToInputValue(e.dataApresentacao) + '" onchange="updateItem(\'excecoes\',' + idx + ",'dataApresentacao',this.value?new Date(this.value):null)\"></td>";
    html += "<td>" + (volta ? formatDate(volta) : "—") + "</td>";
    html += '<td><button class="del-btn" onclick="removeItem(\'excecoes\',' + idx + ')">🗑</button></td></tr>';

  html += "</tbody></table>";
  return html;
}

function renderPedidos() {
  var html = '<div class="toolbar"><p class="hint" style="margin:0">' + state.pedidos.length + ' pedidos por rever</p><button class="btn" onclick="addItem(\'pedidos\', emptyPedido)">+ Adicionar</button></div>';

  html += '<input value="' + esc(state.formsLink) + '" oninput="state.formsLink=this.value" placeholder="https://docs.google.com/spreadsheets/d/e/.../pubhtml" style="flex:1;min-width:280px">';
  html += '<button class="btn btn-primary" onclick="handleConsultarForms()">🔄 Consultar Forms</button></div>';
  html += '<p class="hint" style="margin:6px 0 0">No Google Sheets das respostas: Ficheiro > Partilhar > Publicar na Web > Publicar, e cola aqui esse link. Fica guardado, não precisas de colar outra vez.</p></div>';
  html += '<p class="hint">Importa o Excel (com a folha Forms) ou usa "Consultar Forms" acima para trazer submissões automaticamente. Aprovar move o pedido para as Exceções e tira-o daqui.</p>';
  html += '<table><thead><tr><th>Submetido em</th><th>Nome</th><th>NIP</th><th>NIP confere?</th><th>Início</th><th>Apresentação</th><th>Motivo</th><th></th><th></th></tr></thead><tbody>';
  if (state.pedidos.length === 0) html += '<tr><td colspan="9" class="empty">Sem pedidos por rever.</td></tr>';
  state.pedidos.forEach(function (p, idx) {
    var porNome = state.militares.filter(function (m) { return m.nome === p.nome; })[0];
    var nipLimpo = (p.nip || "").trim().toLowerCase();
    var nipStatus = null;
    if (p.nome && nipLimpo && porNome) nipStatus = (porNome.nip || "").trim().toLowerCase() === nipLimpo ? "ok" : "mismatch";
    var naoEncontrado = p.nome && !porNome;
    html += "<tr>";
    html += '<td style="color:#94a3b8;white-space:nowrap">' + (p.carimbo ? formatDate(p.carimbo) : "—") + "</td>";
    html += '<td><select class="' + (naoEncontrado ? "warn" : "") + '" onchange="updateItem(\'pedidos\',' + idx + ",'nome',this.value)\">";
    html += militarOptions(p.nome);
    if (naoEncontrado) html += '<option value="' + esc(p.nome) + '" selected>' + esc(p.nome) + " (não encontrado!)</option>";
    html += "</select></td>";
    html += '<td><input value="' + esc(p.nip) + '" oninput="updateItem(\'pedidos\',' + idx + ",'nip',this.value)\" style=\"width:90px\"></td>";
    html += '<td>' + (nipStatus === "ok" ? '<span class="ok">✓ Sim</span>' : nipStatus === "mismatch" ? '<span class="warn">⚠ Não bate</span>' : '<span style="color:#cbd5e1">—</span>') + "</td>";
    html += '<td><input type="date" value="' + dateToInputValue(p.dataInicio) + '" onchange="updateItem(\'pedidos\',' + idx + ",'dataInicio',this.value?new Date(this.value):null)\"></td>";
    html += '<td><input type="date" value="' + dateToInputValue(p.dataApresentacao) + '" onchange="updateItem(\'pedidos\',' + idx + ",'dataApresentacao',this.value?new Date(this.value):null)\"></td>";
    html += '<td><input value="' + esc(p.motivo) + '" oninput="updateItem(\'pedidos\',' + idx + ",'motivo',this.value)\" style=\"width:100px\"></td>";
    html += '<td><button class="btn btn-approve" ' + (!p.nome || !p.dataInicio || !p.dataApresentacao ? "disabled" : "") + ' onclick="handleAprovarPedido(' + idx + ')">Aprovar</button></td>';
    html += '<td><button class="del-btn" onclick="removeItem(\'pedidos\',' + idx + ')">🗑</button></td></tr>';
  });
  html += "</tbody></table>";
  return html;
}

  html += '<div style="border-top:1px solid #e2e8f0;padding-top:12px;margin-top:12px"><p class="hint">Tudo o que fazes aqui fica guardado automaticamente neste browser, neste computador — se fechares o separador ou atualizares a página, os dados continuam aqui na próxima vez que abrires este ficheiro. Não sai deste computador.</p>';
  html += '<button class="btn" style="margin-top:6px;border-color:#fca5a5;color:#b91c1c" onclick="if(confirm(\'Apagar tudo o que está guardado (militares, exceções, escalas geradas)? Não dá para desfazer.\')){localStorage.removeItem(STORAGE_KEY);location.reload();}">🗑 Apagar todos os dados guardados</button></div>';

function renderEscala(results) {
  if (results.length === 0) return '<p class="empty">Ainda sem escala gerada. Vai a Configuração e clica em Gerar escala.</p>';
  var html = '<table><thead><tr><th>Data</th><th>Dia</th><th>Tipo</th><th>Efetivo</th><th>Reserva</th></tr></thead><tbody>';
  var counts = {};
  results.forEach(function (r) {
    var cls = r.tipo === "Fim de Semana" ? "row-weekend" : "";
    if (r.efetivo === "SEM DISPONÍVEL" || r.reserva === "SEM DISPONÍVEL") cls = "row-missing";
    html += '<tr class="' + cls + '"><td>' + formatDate(r.data) + "</td><td>" + r.diaSemana + "</td><td>" + r.tipo + "</td><td><b>" + esc(r.efetivo) + "</b></td><td>" + esc(r.reserva) + "</td></tr>";
    [r.efetivo, r.reserva].forEach(function (n) { var nm = n.split(" PT / ")[0].split(" PD / ")[0]; if (nm !== "SEM DISPONÍVEL") counts[nm] = (counts[nm] || 0) + 1; });
  });
  html += "</tbody></table>";
  html += '<p class="hint" style="margin-top:14px">Nº de serviços por militar:</p><div>';
  Object.keys(counts).sort(function (a, b) { return counts[b] - counts[a]; }).forEach(function (n) { html += '<span class="tag">' + esc(n) + ": " + counts[n] + "</span>"; });
  html += "</div>";
  return html;
}
